name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

# RN 0.69.1 requires Node 18. Node 24 breaks the CLI's JSON output to Gradle.
# The FORCE env var below only affects the Actions runner JS runtime, not our app.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Android – debug APK
  # ─────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚠️  RN 0.69.1 is incompatible with Node 20+.
      # Its CLI crashes silently on newer Node and outputs "info Run CLI with
      # --verbose flag for more details." to stdout instead of JSON, which
      # causes Gradle's native_modules.gradle (line 250) to throw a
      # JsonException. Pin to Node 18 (last version RN 0.69.x supports).
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Release / signed build ──────────────────
      # Uncomment this block and add secrets to build a signed AAB for Play Store.
      #
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
      #       > android/app/release.keystore
      #
      # - name: Build signed release AAB
      #   run: |
      #     cd android && ./gradlew bundleRelease \
      #       -Pandroid.injected.signing.store.file=release.keystore \
      #       -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      # ────────────────────────────────────────────

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # iOS – simulator build (no code-signing)
  # ─────────────────────────────────────────────
  ios:
    name: iOS Build
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Same Node 18 pin as Android – RN 0.69.1 requirement.
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Set up Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios

      # ── Release / signed build ──────────────────
      # For a real device IPA you need a provisioning profile and certificate.
      # Store them as GitHub secrets and decode them here, then change the
      # xcodebuild command to use CODE_SIGN_IDENTITY and PROVISIONING_PROFILE.
      # ────────────────────────────────────────────

      - name: Build for simulator (no signing)
        run: |
          xcodebuild \
            -workspace ios/BrilliantApp.xcworkspace \
            -scheme BrilliantApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 14
