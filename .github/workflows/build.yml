name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────
  # Android – debug APK (no signing needed)
  # ─────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Release / signed build ──────────────────
      # Uncomment this block and add secrets to build a signed AAB for Play Store.
      #
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
      #       > android/app/release.keystore
      #
      # - name: Build signed release AAB
      #   run: |
      #     cd android && ./gradlew bundleRelease \
      #       -Pandroid.injected.signing.store.file=release.keystore \
      #       -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      # ────────────────────────────────────────────

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # iOS – simulator build (no code-signing)
  # ─────────────────────────────────────────────
  ios:
    name: iOS Build
    runs-on: macos-14          # Apple Silicon runner; has Xcode 15+

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Set up Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true      # runs `bundle install` and caches gems

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios

      # ── Release / signed build ──────────────────
      # For a real device IPA you need a provisioning profile and certificate.
      # Store them as GitHub secrets and decode them here, then change the
      # xcodebuild command to use CODE_SIGN_IDENTITY and PROVISIONING_PROFILE.
      # ────────────────────────────────────────────

      - name: Build for simulator (no signing)
        run: |
          xcodebuild \
            -workspace ios/BrilliantApp.xcworkspace \
            -scheme BrilliantApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      # Simulator builds don't produce an IPA, but you can upload the .app bundle.
      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 14
